<svg xmlns="http://www.w3.org/2000/svg"
     width="280" height="34"
     role="img" aria-label="INSTAGRAM: FOLLOW">
  <title>INSTAGRAM: FOLLOW</title>
  <defs>
    <!-- CRT phosphor scanline grid (4 px repeat) -->
    <pattern id="sl-instagram-follow-280" x="0" y="0" width="280" height="4"
             patternUnits="userSpaceOnUse">
      <rect width="280" height="2" fill="#000" opacity="0.14"/>
    </pattern>
    <!-- Top-edge gradient pulse accent seam -->
    <linearGradient id="tg-instagram-follow-280" x1="0" y1="0" x2="1" y2="0"
                    gradientUnits="objectBoundingBox">
      <stop offset="0"   stop-color="#e1306c" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#e1306c" stop-opacity="1"/>
      <stop offset="1"   stop-color="#e1306c" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-0.4 0;0.4 0;-0.4 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <clipPath id="cb-instagram-follow-280">
      <rect width="280" height="34"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cb-instagram-follow-280)">
    <!-- ── Void background ── -->
    <rect width="280" height="34" fill="#0b0c0b"/>
    <!-- Subtle tag-side tint -->
    <rect width="100" height="34" fill="#0e120e"/>

    <!-- ── Border ── -->
    <rect width="278" height="32" x="1" y="1"
          fill="none" stroke="#1a2a24" stroke-width="1"/>

    <!-- ── Top-edge gradient pulse ── -->
    <rect width="280" height="1" fill="url(#tg-instagram-follow-280)"/>

    <!-- ── Divider seam ── -->
    <rect x="100" y="0" width="1" height="34"
          fill="#e1306c" opacity="0.30"/>

    <!-- ── Corner bracket decorators (border-width trick via path) ── -->
    <path d="M4,4 L4,10 M4,4 L10,4"
          stroke="#1a2a24" stroke-width="1" fill="none"/>
    <path d="M276,4 L276,10 M276,4 L270,4"
          stroke="#1a2a24" stroke-width="1" fill="none"/>
    <path d="M4,30 L4,24 M4,30 L10,30"
          stroke="#1a2a24" stroke-width="1" fill="none"/>
    <path d="M276,30 L276,24 M276,30 L270,30"
          stroke="#1a2a24" stroke-width="1" fill="none"/>

    <!-- ═══════════════════════════════════════════════════════════
         TAG text — chromatic aberration glitch (7-frame steps(1))
         Red channel shifts LEFT, Cyan channel shifts RIGHT
    ═══════════════════════════════════════════════════════════════ -->
    <!-- red channel -->
    <text font-family="'Courier New',Courier,monospace"
          font-size="11" font-weight="700" letter-spacing="0.5"
          fill="#ff3030" text-anchor="middle" x="50" y="22">
      <animate attributeName="x"
               values="48;50;52;49;51;48;50;50" dur="3.7s"
               repeatCount="indefinite" calcMode="discrete"/>
      <animate attributeName="fill-opacity"
               values="0.45;0.10;0.45;0.40;0.20;0.45;0;0.45" dur="3.7s"
               repeatCount="indefinite" calcMode="discrete"/>
      INSTAGRAM
    </text>
    <!-- cyan channel -->
    <text font-family="'Courier New',Courier,monospace"
          font-size="11" font-weight="700" letter-spacing="0.5"
          fill="#00e5ff" text-anchor="middle" x="50" y="22">
      <animate attributeName="x"
               values="52;50;48;51;49;52;50;50" dur="3.7s"
               repeatCount="indefinite" calcMode="discrete"/>
      <animate attributeName="fill-opacity"
               values="0.45;0.10;0.45;0.40;0.20;0.45;0;0.45" dur="3.7s"
               repeatCount="indefinite" calcMode="discrete"/>
      INSTAGRAM
    </text>
    <!-- primary layer -->
    <text font-family="'Courier New',Courier,monospace"
          font-size="11" font-weight="700" letter-spacing="0.5"
          fill="#b8d4b8" text-anchor="middle" x="50" y="22">
      <animate attributeName="x"
               values="50;50;50;50;49;50;50;50"
               dur="3.7s" repeatCount="indefinite" calcMode="discrete"/>
      INSTAGRAM
    </text>

    <!-- ═══════════════════════════════════════════════════════════
         VALUE text — same glitch pattern, accent colour primary
    ═══════════════════════════════════════════════════════════════ -->
    <!-- red channel -->
    <text font-family="'Courier New',Courier,monospace"
          font-size="11" font-weight="700" letter-spacing="0.5"
          fill="#ff3030" text-anchor="middle" x="190" y="22">
      <animate attributeName="x"
               values="188;190;192;189;191;188;190;190" dur="3.7s"
               repeatCount="indefinite" calcMode="discrete"/>
      <animate attributeName="fill-opacity"
               values="0.45;0.10;0.45;0.40;0.20;0.45;0;0.45" dur="3.7s"
               repeatCount="indefinite" calcMode="discrete"/>
      FOLLOW
    </text>
    <!-- cyan channel -->
    <text font-family="'Courier New',Courier,monospace"
          font-size="11" font-weight="700" letter-spacing="0.5"
          fill="#00e5ff" text-anchor="middle" x="190" y="22">
      <animate attributeName="x"
               values="192;190;188;191;189;192;190;190" dur="3.7s"
               repeatCount="indefinite" calcMode="discrete"/>
      <animate attributeName="fill-opacity"
               values="0.45;0.10;0.45;0.40;0.20;0.45;0;0.45" dur="3.7s"
               repeatCount="indefinite" calcMode="discrete"/>
      FOLLOW
    </text>
    <!-- primary layer (accent colour) -->
    <text font-family="'Courier New',Courier,monospace"
          font-size="11" font-weight="700" letter-spacing="0.5"
          fill="#e1306c" text-anchor="middle" x="190" y="22">
      <animate attributeName="x"
               values="190;190;190;190;189;190;190;190"
               dur="3.7s" repeatCount="indefinite" calcMode="discrete"/>
      <animate attributeName="fill-opacity"
               values="1;0.70;1;0.90;1;0.80;1;1"
               dur="3.7s" repeatCount="indefinite" calcMode="discrete"/>
      FOLLOW
    </text>

    <!-- ── CRT scanline overlay ── -->
    <rect width="280" height="34" fill="url(#sl-instagram-follow-280)"/>

    <!-- ── Synchronized screen-flicker pulse ── -->
    <rect width="280" height="34" fill="#0b0c0b">
      <animate attributeName="opacity"
               values="0;0;0;0;0;0.08;0;0" dur="3.7s"
               repeatCount="indefinite" calcMode="discrete"/>
    </rect>
  </g>
</svg>
