<svg xmlns="http://www.w3.org/2000/svg"
     width="220" height="34"
     role="img" aria-label="PLATFORM: DOCKER">
  <title>PLATFORM: DOCKER</title>
  <defs>
    <!-- CRT phosphor scanline grid (4 px repeat) -->
    <pattern id="sl-platform-docker-220" x="0" y="0" width="220" height="4"
             patternUnits="userSpaceOnUse">
      <rect width="220" height="2" fill="#000" opacity="0.14"/>
    </pattern>
    <!-- Top-edge gradient pulse accent seam -->
    <linearGradient id="tg-platform-docker-220" x1="0" y1="0" x2="1" y2="0"
                    gradientUnits="objectBoundingBox">
      <stop offset="0"   stop-color="#2496ed" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#2496ed" stop-opacity="1"/>
      <stop offset="1"   stop-color="#2496ed" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-0.4 0;0.4 0;-0.4 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <clipPath id="cb-platform-docker-220">
      <rect width="220" height="34"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cb-platform-docker-220)">
    <!-- ── Void background ── -->
    <rect width="220" height="34" fill="#0b0c0b"/>
    <!-- Subtle tag-side tint -->
    <rect width="84" height="34" fill="#0e120e"/>

    <!-- ── Border ── -->
    <rect width="218" height="32" x="1" y="1"
          fill="none" stroke="#1a2a24" stroke-width="1"/>

    <!-- ── Top-edge gradient pulse ── -->
    <rect width="220" height="1" fill="url(#tg-platform-docker-220)"/>

    <!-- ── Divider seam ── -->
    <rect x="84" y="0" width="1" height="34"
          fill="#2496ed" opacity="0.30"/>

    <!-- ── Corner bracket decorators (border-width trick via path) ── -->
    <path d="M4,4 L4,10 M4,4 L10,4"
          stroke="#1a2a24" stroke-width="1" fill="none"/>
    <path d="M216,4 L216,10 M216,4 L210,4"
          stroke="#1a2a24" stroke-width="1" fill="none"/>
    <path d="M4,30 L4,24 M4,30 L10,30"
          stroke="#1a2a24" stroke-width="1" fill="none"/>
    <path d="M216,30 L216,24 M216,30 L210,30"
          stroke="#1a2a24" stroke-width="1" fill="none"/>

    <!-- ═══════════════════════════════════════════════════════════
         TAG text — chromatic aberration glitch (7-frame steps(1))
         Red channel shifts LEFT, Cyan channel shifts RIGHT
    ═══════════════════════════════════════════════════════════════ -->
    <!-- red channel -->
    <text font-family="'Courier New',Courier,monospace"
          font-size="11" font-weight="700" letter-spacing="0.5"
          fill="#ff3030" text-anchor="middle" x="42" y="22">
      <animate attributeName="x"
               values="40;42;44;41;43;40;42;42" dur="3.7s"
               repeatCount="indefinite" calcMode="discrete"/>
      <animate attributeName="fill-opacity"
               values="0.45;0.10;0.45;0.40;0.20;0.45;0;0.45" dur="3.7s"
               repeatCount="indefinite" calcMode="discrete"/>
      PLATFORM
    </text>
    <!-- cyan channel -->
    <text font-family="'Courier New',Courier,monospace"
          font-size="11" font-weight="700" letter-spacing="0.5"
          fill="#00e5ff" text-anchor="middle" x="42" y="22">
      <animate attributeName="x"
               values="44;42;40;43;41;44;42;42" dur="3.7s"
               repeatCount="indefinite" calcMode="discrete"/>
      <animate attributeName="fill-opacity"
               values="0.45;0.10;0.45;0.40;0.20;0.45;0;0.45" dur="3.7s"
               repeatCount="indefinite" calcMode="discrete"/>
      PLATFORM
    </text>
    <!-- primary layer -->
    <text font-family="'Courier New',Courier,monospace"
          font-size="11" font-weight="700" letter-spacing="0.5"
          fill="#b8d4b8" text-anchor="middle" x="42" y="22">
      <animate attributeName="x"
               values="42;42;42;42;41;42;42;42"
               dur="3.7s" repeatCount="indefinite" calcMode="discrete"/>
      PLATFORM
    </text>

    <!-- ═══════════════════════════════════════════════════════════
         VALUE text — same glitch pattern, accent colour primary
    ═══════════════════════════════════════════════════════════════ -->
    <!-- red channel -->
    <text font-family="'Courier New',Courier,monospace"
          font-size="11" font-weight="700" letter-spacing="0.5"
          fill="#ff3030" text-anchor="middle" x="152" y="22">
      <animate attributeName="x"
               values="150;152;154;151;153;150;152;152" dur="3.7s"
               repeatCount="indefinite" calcMode="discrete"/>
      <animate attributeName="fill-opacity"
               values="0.45;0.10;0.45;0.40;0.20;0.45;0;0.45" dur="3.7s"
               repeatCount="indefinite" calcMode="discrete"/>
      DOCKER
    </text>
    <!-- cyan channel -->
    <text font-family="'Courier New',Courier,monospace"
          font-size="11" font-weight="700" letter-spacing="0.5"
          fill="#00e5ff" text-anchor="middle" x="152" y="22">
      <animate attributeName="x"
               values="154;152;150;153;151;154;152;152" dur="3.7s"
               repeatCount="indefinite" calcMode="discrete"/>
      <animate attributeName="fill-opacity"
               values="0.45;0.10;0.45;0.40;0.20;0.45;0;0.45" dur="3.7s"
               repeatCount="indefinite" calcMode="discrete"/>
      DOCKER
    </text>
    <!-- primary layer (accent colour) -->
    <text font-family="'Courier New',Courier,monospace"
          font-size="11" font-weight="700" letter-spacing="0.5"
          fill="#2496ed" text-anchor="middle" x="152" y="22">
      <animate attributeName="x"
               values="152;152;152;152;151;152;152;152"
               dur="3.7s" repeatCount="indefinite" calcMode="discrete"/>
      <animate attributeName="fill-opacity"
               values="1;0.70;1;0.90;1;0.80;1;1"
               dur="3.7s" repeatCount="indefinite" calcMode="discrete"/>
      DOCKER
    </text>

    <!-- ── CRT scanline overlay ── -->
    <rect width="220" height="34" fill="url(#sl-platform-docker-220)"/>

    <!-- ── Synchronized screen-flicker pulse ── -->
    <rect width="220" height="34" fill="#0b0c0b">
      <animate attributeName="opacity"
               values="0;0;0;0;0;0.08;0;0" dur="3.7s"
               repeatCount="indefinite" calcMode="discrete"/>
    </rect>
  </g>
</svg>
