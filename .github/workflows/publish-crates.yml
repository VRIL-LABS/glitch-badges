name: Publish to crates.io

on:
  release:
    types: [released]  # triggers only when a non-prerelease GitHub release is published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-crates:
    name: Build & publish glitch-badges to crates.io
    runs-on: ubuntu-latest
    environment:
      name: crates-io
      url: https://crates.io/crates/glitch-badges
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        working-directory: packages/rs
        run: cargo test --all-features

      - name: Publish to crates.io
        working-directory: packages/rs
        run: cargo publish --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
